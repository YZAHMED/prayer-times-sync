name: Update Stream Url

on:
  schedule:
    - cron: '0 5 * * *' # 5:00 AM UTC = 1:00 AM Toronto Time (EDT)
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  update-stream-url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Upgraded to v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Upgraded to v4
        with:
          node-version: '20' # Upgraded to 20

      - name: Install dependencies
        run: npm ci 

      
      - name: Run Retriever
        run: node stream_link_retriever.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stream_url.txt
          git diff --staged --quiet || (git commit -m "Auto-update the stream URL" && git push)