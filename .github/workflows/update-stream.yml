name: Update Stream Url

on:
  schedule:
    - cron: '0 5 * * *' # Adjust the schedule to run before your daily prayers
  workflow_dispatch: # Allows manual triggering of the workflow

permissions:
  contents: write # Allows the workflow to push changes to the repository

jobs:
  update-stream-url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Use the Node.js version compatible with your project 

      - name: Install dependencies
        run: npm ci # Installs dependencies based on package-lock.json

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stream_url.txt
          git diff --staged --quiet || (git commit -m "Auto-update the stream URL" && git push)